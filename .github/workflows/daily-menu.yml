name: daily-menu

on:
  schedule:
    - cron: "30 1 * * *"  # 10:30 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enjoy/allday-menu-bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: enjoy/allday-menu-bot/requirements.txt

      - name: Install Tesseract (kor)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-kor

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run menu bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python fetch_menu.py

      - name: Commit history if changed
        run: |
          cd "$GITHUB_WORKSPACE"
          if ! git diff --quiet -- enjoy/allday-menu-bot/data/history.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add enjoy/allday-menu-bot/data/history.json
            git commit -m "menu: $(date -u +%F)"
            git push
          else
            echo "no history change"
          fi
