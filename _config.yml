title: 에어프레미아 AI 이용 보안 가이드
description: 에어프레미아 AI 이용 보안 가이드 위키
url: "https://bliss-doha.github.io"
baseurl: "/airpremia-ai-guide"
remote_theme: just-the-docs/just-the-docs@v0.10.1
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
color_scheme: airpremia
search_enabled: true
search:
  heading_level: 3
  previews: 3
  tokenizer_separator: /[\s/]+/
heading_anchors: true
defaults:
  - scope:
      path: ""
    values:
      layout: default
callouts:
  note:
    title: 참고
    color: blue
  warning:
    title: 주의
    color: yellow
  danger:
    title: 금지
    color: red
  tip:
    title: 팁
    color: green
nav_external_links:
  - title: HTML 배포본 (v1.0 원본)
    url: https://bliss-doha.github.io/airpremia-ai-guide/
exclude:
  - README.md
  - archive/
